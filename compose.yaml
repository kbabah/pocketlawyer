# Docker Compose Configuration for PocketLawyer
# For local testing and production deployment

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.production  # Create this file based on .env.production.example
    environment:
      NODE_ENV: production
      # Override with actual secrets in production via CI/CD or secrets manager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# For production deployment, use:
# docker compose --env-file .env.production up -d
